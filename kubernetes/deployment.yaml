---
apiVersion: v1
kind: Namespace
metadata:
  name: command-runner
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: command-runner
  namespace: command-runner
  labels:
    app: command-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: command-runner
  template:
    metadata:
      labels:
        app: command-runner
    spec:
      containers:
      - name: command-runner
        image: btjimerson/command-runner:0.1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: command-runner
  namespace: command-runner
  labels:
    app: command-runner
    service: command-runner
spec:
  ports:
  - port: 8080
    name: http
  selector:
    app: command-runner
